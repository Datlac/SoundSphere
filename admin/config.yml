backend:
  name: git-gateway
  branch: main # Nhánh chính của bạn

media_folder: "assets/uploads" # Không quan trọng lắm vì bạn dùng link Cloudinary

collections:
  - name: "data"
    label: "Quản lý Dữ liệu"
    files:
      - name: "songs"
        label: "Kho Nhạc (Songs)"
        file: "assets/data/songs.json" # Trỏ đúng vào file bạn vừa tạo ở Bước 1
        fields:
          - { label: "Danh sách bài hát", name: "songs", widget: "list", fields: [
              { label: "ID", name: "id", widget: "number", value_type: "int" },
              { label: "Tên bài hát", name: "title", widget: "string" },
              { label: "Nghệ sĩ", name: "artist", widget: "string" },
              { label: "Link nhạc (MP3)", name: "src", widget: "string", hint: "Dán link Cloudinary MP3 vào đây" },
              { label: "Link ảnh bìa", name: "cover", widget: "string", hint: "Dán link Cloudinary ảnh vào đây" },
              { label: "Thời lượng", name: "duration", widget: "string", required: false }
            ]
          }